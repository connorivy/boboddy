name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - run: bun install --frozen-lockfile
      - name: Check generated client is in sync
        run: |
          bun run clientGen:ts
          if [ -n "$(git status --porcelain packages/sdks/js/src/generated/)" ]; then
            echo "Generated API client is out of sync with the OpenAPI spec."
            echo "Run 'bun run clientGen:ts' locally and commit the changes."
            git diff packages/sdks/js/src/generated/
            exit 1
          fi
      - run: bun run --filter '@boboddy/containers' --filter '@boboddy/opencode-plugin' declarations
      - run: bun run typecheck
      - run: bun run test
