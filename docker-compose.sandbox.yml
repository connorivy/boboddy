services:
  agent-runner:
    build:
      context: .
      dockerfile: Dockerfile.sandbox-runner
    environment:
      SANDBOX_SOURCE_REPO_PATH: /workspace/source
      SANDBOX_WORKSPACE_ROOT: /tmp
      SANDBOX_AGENT_BRANCH_PREFIX: ${SANDBOX_AGENT_BRANCH_PREFIX:-sandbox}
      SANDBOX_AGENT_MODEL: ${SANDBOX_AGENT_MODEL:-openai/gpt-4.1-mini}
      GITHUB_MODELS_API_KEY: ${GITHUB_MODELS_API_KEY}
    volumes:
      - ${SANDBOX_SOURCE_REPO_PATH:-.}:/workspace/source:ro
